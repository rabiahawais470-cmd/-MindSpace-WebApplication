<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="file:///Users/haim/learning/-MindSpace-WebApplication/MindSpace/Styles/site.css" />
  <title>MindSpace UI Check</title>
  <style>
    body { margin: 0; padding: 24px; background: #f5f7fb; }
    .fixture { display: grid; gap: 32px; }
    .sidebar-shell { position: relative; width: 280px; height: 420px; background: #31006F; color: white; border-radius: 20px; }
    .sidebar-shell .sidebar-collapse-btn { position: absolute; }
    .sidebar-shell .sidebar-collapse-btn i { pointer-events: none; }
    .fake-sidebar-content { padding: 56px 20px 20px; }
    .card-frame { background: white; padding: 24px; border-radius: 16px; }
  </style>
</head>
<body>
  <div class="fixture">
    <section class="ms-testimonials">
      <div class="ms-testimonials-grid">
        <div class="ms-testimonials-left">
          <span class="ms-testimonials-badge"><i class="fa-solid fa-star"></i> Loved by learners</span>
          <h2 class="ms-testimonials-title">Voices from Our Community</h2>
          <p class="ms-testimonials-sub">Real reflections from students and young adults using MindSpace to build small, repeatable mental-wellness habits.</p>
        </div>
        <div class="ms-testimonials-right"><article class="ms-testimonial-card active"><p>Testimonial card</p></article></div>
      </div>
    </section>

    <div class="sidebar-shell">
      <button type="button" class="sidebar-collapse-btn" aria-label="Collapse sidebar"><i class="fa-solid fa-chevron-left"></i></button>
      <div class="fake-sidebar-content">Sidebar fixture</div>
    </div>

    <div class="dash-page">
      <div class="dash-panel card-frame">
        <h1 class="dash-header-title">Dashboard</h1>
        <p class="dash-header-sub">A subtle background should sit behind this area.</p>
        <div class="dash-stat-card card-frame" style="margin-top:16px;">Stat card</div>
      </div>
    </div>
  </div>
</body>
</html>
