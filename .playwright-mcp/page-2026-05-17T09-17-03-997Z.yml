            - heading "The Science of Sleep and Mental Health" [level=6] [ref=e58]
            - generic [ref=e59]: article
          - paragraph [ref=e60]: Sleep is one of the most active processes your brain undergoes each night. The brain consolidates memories, clears metabolic waste products, and regulates emotional responses during sleep. Sleep cycles (~90 minutes each) alternate between NREM Stage 1-2 (light sleep), NREM Stage 3 (deep slow-wave sleep -- tissue repair, immune strengthening), and REM sleep (vivid dreaming, emotional memory processing). Sleep deprivation increases amygdala reactivity by up to 60%, making you emotionally reactive. Chronic poor sleep is one of the strongest predictors of depression and anxiety. Adults need 7-9 hours per night.
      - generic [ref=e62]:
        - generic [ref=e64]: 
        - generic [ref=e65]:
          - generic [ref=e66]:
            - heading "Building a Sleep-Friendly Environment and Routine" [level=6] [ref=e67]
            - generic [ref=e68]: article
          - paragraph [ref=e69]: "Sleep hygiene covers habits and environmental conditions that promote high-quality sleep. Environment: keep your bedroom at 16-20 degrees C (60-68 F) -- core body temperature must drop to initiate sleep; use blackout curtains since even small amounts of light suppress melatonin; use your bed only for sleep to strengthen the mental association. Behavioural strategies: wake at the same time every day (including weekends) to anchor your circadian rhythm; follow a 30-60 minute wind-down routine with dim lights and no screens; avoid caffeine after 2pm (half-life is 5-6 hours); avoid alcohol before bed as it fragments sleep and suppresses REM; exercise regularly but avoid vigorous workouts within 2 hours of bedtime."
