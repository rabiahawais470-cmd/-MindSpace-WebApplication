            - heading "What is Self-Care? The Science Behind It" [level=6] [ref=e55]
            - generic [ref=e56]: article
          - paragraph [ref=e57]:
            - text: Self-care is the deliberate practice of activities that maintain and improve physical, mental, and emotional health. It is not selfish -- it is essential. Research shows that consistent self-care reduces burnout, lowers cortisol, and improves immune function.
            - text: "The World Health Organization defines self-care as the ability of individuals to promote health, prevent disease, and cope with illness with or without the support of a healthcare provider. Self-care falls into six key domains: physical (sleep, nutrition, exercise), emotional (recognising and expressing feelings), social (healthy relationships), mental (stimulation, creativity), spiritual (meaning and purpose), and professional (work-life balance)."
            - text: One foundational concept is the oxygen mask principle -- you must care for yourself before you can effectively help others. Chronic self-neglect leads to compassion fatigue, burnout, and reduced ability to regulate emotions. Even small daily acts of self-care accumulate into meaningful wellbeing over time.
      - generic [ref=e59]:
        - generic [ref=e61]: 
        - generic [ref=e62]:
          - generic [ref=e63]:
            - heading "Practical Self-Care Strategies for Every Day" [level=6] [ref=e64]
            - generic [ref=e65]: article
          - paragraph [ref=e66]:
            - text: "Effective self-care does not require vast amounts of time. Research-backed strategies include:"
            - text: "1. Boundary Setting: Learning to say no is a skill. Healthy boundaries protect your energy and reduce resentment. Practice by identifying your limits and communicating them clearly."
            - text: "2. The HALT Technique: When overwhelmed, check if you are Hungry, Angry, Lonely, or Tired. Addressing these basic needs first often resolves emotional distress."
            - text: "3. The 5-Minute Reset: Set a timer for 5 minutes and do one of the following -- stretch, breathe deeply, write three things you are grateful for, or step outside."
            - text: "4. Digital Detox: Schedule 30-60 minutes daily away from screens, especially before bed. Constant connectivity activates the stress response and prevents recovery."
            - text: "5. Nourishment: Eating regular, balanced meals stabilises blood sugar and mood. The gut-brain connection means what you eat directly affects how you feel."
            - text: "6. Joyful Movement: Any physical activity you enjoy counts as self-care. Aim for at least 20-30 minutes most days."
