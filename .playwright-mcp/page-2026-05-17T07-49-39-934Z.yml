              - heading "What is Anxiety? Types and Symptoms" [level=6] [ref=e44]
              - generic [ref=e45]: article
            - paragraph [ref=e46]: "Anxiety is a natural response to perceived threat or uncertainty. It becomes a disorder when persistent, excessive, and interfering with daily life. Main anxiety disorders include: Generalised Anxiety Disorder (GAD) -- persistent worry about many topics; Panic Disorder -- recurrent unexpected panic attacks with physical symptoms; Social Anxiety Disorder -- intense fear of social situations; and Specific Phobias -- irrational fear of a specific object or situation. Common physical signs: racing heart, sweating, trembling, dry mouth, nausea. Cognitive signs: catastrophic thinking, overestimating danger, difficulty concentrating."
        - generic [ref=e48]:
          - generic [ref=e50]: 
          - generic [ref=e51]:
            - generic [ref=e52]:
              - heading "Cognitive-Behavioural Techniques for Anxiety" [level=6] [ref=e53]
              - generic [ref=e54]: article
            - paragraph [ref=e55]: "Cognitive-Behavioural Therapy (CBT) is the gold-standard treatment for anxiety. Key CBT techniques: (1) Thought Records -- write the situation, automatic thought, evidence for/against, and a balanced alternative thought; (2) Behavioural Experiments -- test anxious predictions against reality through gradual exposure; (3) Exposure Hierarchy -- list feared situations from least to most anxiety-provoking, then face them gradually; (4) Cognitive Restructuring -- challenge catastrophising, mind-reading, and overestimating probability; (5) Relaxation -- diaphragmatic breathing, progressive muscle relaxation, and mindfulness reduce the physical component of anxiety."
