            - heading "What is Emotional Resilience?" [level=6] [ref=e60]
            - generic [ref=e61]: article
          - paragraph [ref=e62]: "Emotional resilience is the ability to adapt positively in the face of adversity, trauma, or significant stress. Resilient people do not avoid difficult emotions -- they process them effectively and grow from experience. Key dimensions: emotional regulation (manage emotions without being overwhelmed); cognitive flexibility (reframe situations and find alternative interpretations); social connectedness (strong relationships are the most powerful predictor of resilience); self-efficacy (belief in your ability to cope, built through experience); and purpose and meaning (a sense of why buffers against stress). Martin Seligman's PERMA model identifies five pillars of wellbeing: Positive Emotion, Engagement, Relationships, Meaning, and Accomplishment."
      - generic [ref=e64]:
        - generic [ref=e66]: 
        - generic [ref=e67]:
          - generic [ref=e68]:
            - heading "Building Your Resilience Toolkit" [level=6] [ref=e69]
            - generic [ref=e70]: article
          - paragraph [ref=e71]: "Resilience is a set of learnable skills. Evidence-based strategies: (1) Growth mindset -- view challenges as learning opportunities; replace \"I cannot do this\" with \"I cannot do this yet\"; (2) Gratitude practice -- write 3 specific things you appreciate daily, shown to increase wellbeing within 2-4 weeks; (3) Build your support network -- identify 3-5 people you can call when struggling; (4) Emotional vocabulary -- label emotions precisely rather than just \"bad\" (e.g. \"disappointed\", \"overwhelmed\", \"embarrassed\"); (5) Accept what you cannot control -- distinguish between what is and is not within your control; (6) Physical self-care -- sleep, exercise, and nutrition are foundational to resilience; (7) Post-traumatic growth journaling -- write about what happened, how you felt, what you learned, and how it has shaped you."
