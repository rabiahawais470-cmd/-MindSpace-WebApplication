            - heading "Introduction to Mindfulness" [level=6] [ref=e44]
            - generic [ref=e45]: article
          - paragraph [ref=e46]:
            - text: Mindfulness is the practice of intentionally directing your attention to the present moment with openness and without judgment. Rooted in Buddhist traditions but thoroughly validated by modern neuroscience, mindfulness has been shown to reduce anxiety, depression, and stress while improving focus, emotional regulation, and overall wellbeing.
            - text: "Core mindfulness principles:"
            - text: "- Present-moment awareness: focusing on what's happening now, not past regrets or future worries"
            - text: "- Non-judgment: observing thoughts and feelings without labelling them as good or bad"
            - text: "- Acceptance: allowing experiences to be as they are without fighting them"
            - text: "- Beginner's mind: approaching each moment with curiosity and openness"
            - text: Research from Harvard, Oxford, and other leading institutions confirms that regular mindfulness practice (as little as 10 minutes per day) can physically change brain structure, increasing grey matter in areas associated with learning, memory, and emotional regulation.
