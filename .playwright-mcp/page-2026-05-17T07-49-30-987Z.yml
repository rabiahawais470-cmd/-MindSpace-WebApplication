            - generic [ref=e62]:
              - heading "Mindfulness for Students - Guide" [level=6] [ref=e63]
              - generic [ref=e64]: article
            - paragraph [ref=e65]:
              - text: "As a student, your mind is constantly pulled in multiple directions: lectures, assignments, social pressures, and future concerns. Mindfulness gives you the ability to choose where to direct your attention."
              - text: "Simple mindfulness practices for students:"
              - text: "1. Mindful morning routine (5 minutes): Before checking your phone, take 5 deep breaths and set a positive intention for the day."
              - text: "2. Mindful eating: During at least one meal, put away devices and eat slowly, noticing flavours, textures, and sensations."
              - text: "3. Study mindfulness: Before studying, take 3 deep breaths. Notice when your mind wanders and gently redirect attention to the material."
              - text: "4. Mindful walking: During breaks between classes, walk slowly and notice the sensation of each step."
              - text: "5. Evening reflection (3 minutes): Before sleep, reflect on 3 things you're grateful for from the day."
